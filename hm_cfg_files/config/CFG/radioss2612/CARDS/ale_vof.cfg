ATTRIBUTES(COMMON)
{
    ALE_VOF_IFORM           = VALUE(INT,  "Volume Of Fluid activation flag");
    /* ================================ HM =================================*/
    IO_FLAG                 = VALUE(INT, "");
    KEYWORD_STR             = VALUE(STRING, "Solver Keyword");
}

SKEYWORDS_IDENTIFIER(COMMON)
{
    KEYWORD_STR             = 9000;
    ALE_VOF_IFORM           = 2627;
    IO_FLAG                 = -1;
}

DEFAULTS(COMMON)
{
    ALE_VOF_IFORM          = 1.0;
}

GUI(COMMON)
{
    ASSIGN(KEYWORD_STR, "/ALE/VOF");
    SEPARATOR("ALE_VOF");
    RADIO(ALE_VOF_IFORM,"Volume of Fluid activation flag")
    {
        ADD(0,"0: disabled");
        ADD(1,"1: enabled");
    }
    SEPARATOR("");
}

FORMAT(radioss2612)
{
    ASSIGN(IO_FLAG,0,EXPORT);
    ASSIGN(IO_FLAG,1,IMPORT);

    if(IO_FLAG == 0)
    {
        HEADER ("/ALE/VOF");
        COMMENT("#    IFORM");
        CARD ("%10d",ALE_VOF_IFORM);
    }
    else
    {
        CARD ("%10d",ALE_VOF_IFORM);
    }
}
